info:
  name: Update Task
  type: http
  seq: 3

http:
  method: PUT
  url: "{{baseUrl}}/tasks/:id"
  params:
    - name: id
      value: "1"
      type: path
  body:
    type: json
    data: |-
      {
        "title": "Updated title",
        "description": "Optional new description",
        "status": "in_progress"
      }
  auth:
    type: bearer
    token: "{{token}}"

docs: |
  All three fields (title, description, status) are optional — send any subset.
  Status must be one of: todo, in_progress, done.

settings:
  encodeUrl: true
