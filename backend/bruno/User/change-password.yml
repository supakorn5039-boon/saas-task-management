info:
  name: Change Password
  type: http
  seq: 2

http:
  method: PUT
  url: "{{baseUrl}}/user/password"
  body:
    type: json
    data: |-
      {
        "currentPassword": "password123",
        "newPassword": "new-strong-password"
      }
  auth:
    type: bearer
    token: "{{token}}"

docs: |
  Change own password. Requires the current password and a new one (min 8 chars).
  Returns 401 if current password is wrong, 400 if the new one matches the old.

settings:
  encodeUrl: true
