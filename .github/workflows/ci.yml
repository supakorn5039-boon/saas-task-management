name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: username
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL_TEST: host=localhost port=5432 user=username password=password dbname=saas_test sslmode=disable TimeZone=UTC
      # bcrypt cost 14 takes ~1s per hash. With ~50 Register/Login calls
      # across the test suite, that's ~minutes on its own. Cost 4 (MinCost)
      # takes ~1ms. Production keeps cost 14 — see security/password_encryption.go.
      BCRYPT_COST: "4"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x
          cache-dependency-path: backend/go.sum

      - name: Create test database
        run: PGPASSWORD=password psql -h localhost -U username -d postgres -c "CREATE DATABASE saas_test;"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        # -p 1 forces packages to run serially so parallel TRUNCATEs on the
        # shared test DB don't race each other. -race is intentionally NOT
        # set — race-detector compilation roughly doubles CI wall-clock time
        # for limited value on this codebase. Run `go test -race` locally
        # before pushing if you've touched anything goroutine-heavy.
        run: go test -count=1 -p 1 ./...

  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
