name: CI

on:
   push:
      branches: [main, dev]
   pull_request:
      branches: [main, dev]

jobs:
   backend:
      name: Backend - Go CI
      runs-on: ubuntu-latest

      services:
         postgres:
            image: postgres:17
            env:
               POSTGRES_USER: username
               POSTGRES_PASSWORD: password
               POSTGRES_DB: postgres
            ports:
               - 5432:5432
            options: >-
               --health-cmd pg_isready
               --health-interval 10s
               --health-timeout 5s
               --health-retries 5

      defaults:
         run:
            working-directory: backend

      steps:
         - uses: actions/checkout@v4

         - name: Set up Go
           uses: actions/setup-go@v5
           with:
              go-version: 1.25.x
              cache-dependency-path: backend/go.sum

         - name: Tidy Go modules
           run: go mod tidy

         - name: Backend Build
           run: go build ./...

         - name: Backend Test
           run: go test ./...

   frontend:
      name: Frontend - React CI
      runs-on: ubuntu-latest

      defaults:
         run:
            working-directory: frontend

      steps:
         - uses: actions/checkout@v4

         - name: Set up Node.js
           uses: actions/setup-node@v4
           with:
              node-version: 22

         - name: Frontend Install
           run: npm install

         - name: Frontend Build
           run: npm run build
